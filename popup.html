<!-- Promotional Popup -->
<div id="promo-popup" class="popup-overlay" style="display: none;">
    <div class="popup-content">
        <button id="close-popup" class="close-btn">&times;</button>
        <div class="popup-header">
            <h2>Exclusive Corporate Offer!</h2>
            <p>Get the best internet plans for your business.</p>
        </div>
        <div class="popup-body">
            <p>Sign up now to get a free consultation and exclusive discounts.</p>
            <form id="contact-form">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Email Address" required>
                <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
                <textarea id="message" name="message" placeholder="Your Message" rows="2" required
                    style="width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; height: 60px; resize: none;"></textarea>
                <button type="submit" class="submit-btn">Get Offer</button>
            </form>
            <p class="popup-response" id="popupResponse" style="margin-top: 10px; font-size: 0.9em;"></p>
        </div>
    </div>
</div>
<style>
    .popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .popup-overlay.show {
        opacity: 1;
    }

    .popup-content {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        width: 90%;
        max-width: 450px;
        position: relative;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        transform: translateY(20px);
        transition: transform 0.3s ease;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .popup-overlay.show .popup-content {
        transform: translateY(0);
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        background: none;
        border: none;
        font-size: 28px;
        cursor: pointer;
        color: #555;
        line-height: 1;
    }

    .popup-header h2 {
        color: #302b63;
        margin-bottom: 10px;
        margin-top: 0;
    }

    .popup-body p {
        color: #666;
        margin-bottom: 20px;
    }

    .popup-body input {
        width: 100%;
        padding: 10px;
        margin: 4px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        font-size: 15px;
    }

    .submit-btn {
        background: #302b63;
        color: white;
        border: none;
        padding: 10px 20px;
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        transition: background 0.3s;
        font-weight: bold;
    }

    .submit-btn:hover {
        background: #4a438a;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyFnjT1Ml2PPCy3K-PoY-kyXnovM4H93jiRfXZq8WdrR3NG7a0ZL2aZlwPyCzHfhPCH/exec';
        
        // Utility: send sizing and lifecycle messages to parent when embedded
        function postToParent(msg) { try { if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*'); } catch (e) { } }

        function sendPopupHeight() {
            try {
                var card = document.querySelector('#promo-popup .popup-content');
                if (!card) return;
                var rect = card.getBoundingClientRect();
                var height = Math.ceil(rect.height);
                postToParent({ type: 'popup-height', height: height });
            } catch (e) { }
        }

        // Show popup
        setTimeout(function () {
            var popup = document.getElementById('promo-popup');
            if (popup) {
                popup.style.display = 'flex';
                popup.offsetHeight; // reflow
                popup.classList.add('show');
                sendPopupHeight();
                setTimeout(sendPopupHeight, 300);
            }
        }, 100);

        // Close button
        var closeBtn = document.getElementById('close-popup');
        if (closeBtn) {
            closeBtn.addEventListener('click', function () {
                var popup = document.getElementById('promo-popup');
                popup.classList.remove('show');
                postToParent({ type: 'popup-close' });
                setTimeout(function () { popup.style.display = 'none'; }, 300);
            });
        }

        // Standardized Form Submission Logic
        const form = document.getElementById('contact-form');
        if (form) {
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                const data = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    message: document.getElementById('message').value
                };

                fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                })
                .then(response => response.text())
                .then(result => {
                    alert("Form submitted successfully!");
                    form.reset();
                    postToParent({ type: 'popup-submitted' });
                })
                .catch(error => {
                    alert("Error submitting form.");
                    console.error('Error!', error.message);
                });
            });
        }

        // Parent communication house keeping
        window.addEventListener('resize', sendPopupHeight, { passive: true });
        setTimeout(sendPopupHeight, 800);
    });
</script>
